<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Management</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8fafc;
            --surface: #ffffff;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --success: #059669;
            --danger: #dc2626;
            --danger-hover: #b91c1c;
            --font-main: 'Outfit', sans-serif;
            --radius-md: 8px;
            --radius-lg: 12px;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text-main);
            font-family: var(--font-main);
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        h1 {
            margin: 0;
            font-size: 2rem;
            font-weight: 600;
            color: var(--text-main);
        }

        h2 {
            margin-top: 0;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-size: 0.875rem;
            font-weight: 500;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text-main);
            font-family: var(--font-main);
            font-size: 0.95rem;
            transition: all 0.2s;
            box-sizing: border-box;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .form-row {
            display: flex;
            gap: 1rem;
        }

        .form-row .form-group {
            flex: 1;
        }

        button {
            padding: 0.75rem 1.25rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-family: var(--font-main);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
        }

        button:hover {
            background: var(--primary-hover);
        }

        button.secondary {
            background: #f1f5f9;
            border: 1px solid var(--border);
            color: var(--text-main);
        }

        button.secondary:hover {
            background: #e2e8f0;
        }

        button.danger {
            background: var(--danger);
        }

        button.danger:hover {
            background: var(--danger-hover);
        }

        /* Dialog / Modal */
        dialog {
            border: none;
            border-radius: var(--radius-lg);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            padding: 2rem;
            width: 100%;
            max-width: 600px;
            background: var(--surface);
            color: var(--text-main);
        }

        dialog::backdrop {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
        }

        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        /* Table Styles */
        .table-container {
            overflow-x: auto;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            background: var(--surface);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th,
        td {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
            font-size: 0.95rem;
        }

        th {
            background: #f8fafc;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        tbody tr {
            transition: background 0.2s;
        }

        tbody tr:hover {
            background: #f1f5f9;
        }

        .action-btn {
            padding: 0.35rem 0.75rem;
            font-size: 0.8rem;
            border-radius: 4px;
        }

        .history-table th,
        .history-table td {
            padding: 0.5rem;
            font-size: 0.9rem;
        }

        /* Search & Top Action Bar */
        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .search-box {
            position: relative;
            flex: 1;
            max-width: 400px;
        }

        .search-box input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            border-radius: 99px;
            background: var(--surface);
            box-sizing: border-box;
            border: 1px solid var(--border);
        }

        .search-box svg {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            width: 1rem;
            height: 1rem;
            fill: var(--text-muted);
        }

        .export-group {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .export-group input[type="date"] {
            border-radius: var(--radius-md);
            padding: 0.65rem;
        }
    </style>
</head>

<body hx-ext="response-targets">

    <div class="container">
        <header>
            <h1>3rd Eye Tech Client Manager</h1>
            <div style="display:flex; gap:1rem">
                <button class="secondary" onclick="document.dispatchEvent(new Event('clientsChanged'))">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21.5 2v6h-6M2.13 15.57a10 10 0 1 0 3.8-9.05l-4-2.8"></path>
                    </svg>
                    Refresh Table
                </button>
                <button
                    onclick="let d = document.getElementById('edit-dialog'); let c = document.getElementById('dialog-content'); c.innerHTML = document.getElementById('add-form-template').innerHTML; htmx.process(c); d.showModal();">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    Add Client
                </button>
            </div>
        </header>

        <main>
            <div class="action-bar">
                <form id="search-form" class="search-form" hx-get="/clients/search" hx-target="#client-tbody"
                    hx-trigger="submit, load, clientsChanged from:body"
                    style="display:flex; gap:0.5rem; align-items:center; flex:1; flex-wrap:wrap;">
                    <div class="search-box" style="flex:1; max-width: 300px;">
                        <svg viewBox="0 0 24 24">
                            <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                        <input type="text" name="searchIP" placeholder="Search by IP Address...">
                    </div>
                    <input type="date" name="searchDue" id="searchDue" value="{{TODAY}}" title="Filter by Due Date"
                        style="padding: 0.65rem; border-radius: var(--radius-md); border: 1px solid var(--border);">
                    <label style="display:flex; align-items:center; gap:0.25rem; font-size:0.9rem; cursor:pointer;">
                        <input type="checkbox" name="includePastDue" id="includePastDue" value="true">
                        Include Past Due
                    </label>
                    <button type="submit">Filter</button>
                    <button type="button" class="secondary"
                        onclick="document.getElementById('searchDue').value=''; document.getElementById('includePastDue').checked=false; document.querySelector('input[name=searchIP]').value=''; event.target.form.dispatchEvent(new Event('submit', { cancelable: true, bubbles: true }));">Clear</button>
                </form>

                <form class="export-group" action="/export" method="GET">
                    <input type="date" name="startDate" required title="Export Start Date">
                    <input type="date" name="endDate" required title="Export End Date">
                    <button type="submit" class="secondary">Export Excel</button>
                </form>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>IP Address</th>
                            <th>Users</th>
                            <th>Charge/User</th>
                            <th>Freq (Months)</th>
                            <th>Add. Charges</th>
                            <th>Total Due</th>
                            <th>Dates</th>
                            <th>Last Pmt</th>
                            <th>Receipt</th>
                            <th>Actions</th>
                            <th>Remarks</th>
                        </tr>
                    </thead>
                    <tbody id="client-tbody">
                        <!-- Populated by HTMX Form -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <dialog id="edit-dialog">
        <div id="dialog-content"></div>
    </dialog>

    <template id="add-form-template">
        <h2>Add New Client</h2>
        <form hx-post="/clients" hx-swap="none" hx-on::after-request="document.getElementById('edit-dialog').close()">
            <div class="form-group">
                <label>Client Name</label>
                <input type="text" name="name" required>
            </div>
            <div class="form-group">
                <label>IP Address</label>
                <input type="text" name="ip_address" required>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>No. of Users</label>
                    <input type="number" name="users" min="1" value="1" required>
                </div>
                <div class="form-group">
                    <label>Charge/User (₹)</label>
                    <input type="number" step="0.01" name="charges_per_user" value="0.00" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Pay Freq. (Months)</label>
                    <input type="number" name="pay_frequency" min="1" value="1" required>
                </div>
                <div class="form-group">
                    <label>Additional Charge (₹)</label>
                    <input type="number" step="0.01" name="additional_charges" value="0.00">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group" style="width:100%">
                    <label>Install/Start Date</label>
                    <!-- Leaving blank will default to today dynamically inside Go! -->
                    <input type="date" name="start_date">
                </div>
            </div>
            <div class="form-group">
                <label>Remarks</label>
                <textarea name="remarks" rows="2"></textarea>
            </div>
            <div class="form-actions">
                <button type="button" class="secondary"
                    onclick="document.getElementById('edit-dialog').close()">Cancel</button>
                <button type="submit">Submit Client</button>
            </div>
        </form>
    </template>

</body>

</html>
